{% extends 'base.html' %}

{% block body %}
<main class="container">
    <div class="code-section">
        <div class="code-box">
            <label>Code 1</label>
            <textarea id="code1" placeholder="Pega tu código de Python aquí..."></textarea>
        </div>

        <div class="code-box">
            <label>Code 2</label>
            <textarea id="code2" placeholder="Pega el segundo código aquí..."></textarea>
        </div>
    </div>

    <div class="action-area">
        <button id="compare-btn">Comparar Códigos</button>
    </div>

    <div id="output-container" class="output-box hidden">
        <h3>Resultado del Análisis:</h3>
        <p id="result-text">Esperando ejecución...</p>
    </div>
</main>
{% endblock %}
