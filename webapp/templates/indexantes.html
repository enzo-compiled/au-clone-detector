<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE-edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <!--CSS-->
    <link rel="stylesheet" href="style.css">

    <!--Boxicons CSS-->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <title>Clone Detector</title>
</head>
<body>
<!--comentario-->
    <nav>
        <div class= "nav-bar">
            <span class="logo"><a href="#">Code Clone Detector</a></span>

            <div class="menu">

                <!-- <div class="logo-toggle">
                    <span class="logo"><a href="#">Code Clone Detector</a></span>
                    <i class="bx bx-x sidebarClose"></i>
                </div> -->
                <ul class="nav-links">
                    <li><a href="#">Home</a></li>
                    <li><a href="#">About</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>
            </div>

            <div class="dark-light">
                <i class='bx bx-moon moon'></i>
                <i class='bx bx-sun sun'></i>
            </div>

            
        </div>
    </nav>

    <main class="container">
        <div class="code-section">
            <div class="code-box">
                <label>Code 1</label>
                <textarea id="code1" placeholder="Pega tu código de Python aquí..."></textarea>
            </div>

            <div class="code-box">
                <label>Code 2</label>
                <textarea id="code2" placeholder="Pega el segundo código aquí..."></textarea>
            </div>
        </div>

        <div class="action-area">
            <button id="compare-btn">Comparar Códigos</button>
        </div>

        <div id="output-container" class="output-box hidden">
            <h3>Resultado del Análisis:</h3>
            <p id="result-text">Esperando ejecución...</p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
